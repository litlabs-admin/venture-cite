<!doctype html>
<!-- Quora search results fixture — mimics the rendered HTML structure of
     https://www.quora.com/search?q=Linear&type=question

     Used as a reference for the Puppeteer-based quoraSource scanner.
     Tests mock the browser's $$eval response directly (no file loading needed).

     Variations: ["Linear", "linear app"]
     Expected matches:
       - /Why-is-Linear-the-best   (matches "Linear")
       - /Why-people-love-linear-app (matches "linear app")
     Excluded:
       - /topic/Linear             (topic/ prefix)
       - /Random-thing-no-brand    (no brand variation in title)
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Linear - Search - Quora</title>
  </head>
  <body>
    <div data-testid="search-results">
      <!-- Question result 1: matches "Linear" -->
      <div class="q-box">
        <a href="/Why-is-Linear-the-best">Why is Linear the best PM tool?</a>
      </div>

      <!-- Question result 2: matches "linear app" -->
      <div class="q-box">
        <a href="/Why-people-love-linear-app">Why people love linear app</a>
      </div>

      <!-- Excluded: topic page -->
      <div class="q-box">
        <a href="/topic/Linear">Linear</a>
      </div>

      <!-- Excluded: no brand variation in title -->
      <div class="q-box">
        <a href="/Random-thing-no-brand">Random thing no brand</a>
      </div>
    </div>
  </body>
</html>
